# P2P File Share Application Configuration

# Server Port (Web Interface) - Fixed port 8088
server.port=8088

# P2P Transfer Port (Netty Server)
p2p.server.port=8089

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB

# Logging
logging.level.org.wang.fileshare=INFO
logging.level.io.netty=INFO
