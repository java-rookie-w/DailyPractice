# ===========================================
# Redis Module Configuration Template (YAML)
# ===========================================
# Copy this to your application.yml file
# and modify the values according to your environment

# ===========================================
# Redis Standalone Configuration (Default)
# ===========================================
# Uncomment below for standalone mode and comment out cluster config

spring:
  redis:
    host: localhost
    port: 6379
    password: ""
    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
aa: aa
