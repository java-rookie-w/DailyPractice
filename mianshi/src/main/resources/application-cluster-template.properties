# ===========================================
# Redis Cluster Configuration Template
# ===========================================
# Copy this file content to application.properties
# Replace the placeholder values with your actual cluster information
# Make sure to comment out standalone configuration

spring.application.name=mianshi
server.port=8080

# ===========================================
# CLUSTER CONFIGURATION - MODIFY THESE VALUES
# ===========================================

# Redis Cluster Nodes (Minimum 3 nodes required)
# Replace with your actual cluster node addresses
spring.redis.cluster.nodes[0]=YOUR_NODE_1_HOST:7000
spring.redis.cluster.nodes[1]=YOUR_NODE_2_HOST:7001
spring.redis.cluster.nodes[2]=YOUR_NODE_3_HOST:7002
spring.redis.cluster.nodes[3]=YOUR_NODE_4_HOST:7003
spring.redis.cluster.nodes[4]=YOUR_NODE_5_HOST:7004
spring.redis.cluster.nodes[5]=YOUR_NODE_6_HOST:7005

# Cluster Password (if authentication is enabled, remove # and set password)
# spring.redis.cluster.password=your_cluster_password

# Cluster Timeout (in milliseconds)
spring.redis.cluster.timeout=5000ms

# Maximum number of redirects when executing commands across the cluster
spring.redis.cluster.max-redirects=5

# ===========================================
# CONNECTION POOL SETTINGS
# ===========================================

# Max total connections (increase for high concurrency)
spring.redis.lettuce.pool.max-active=16

# Max idle connections
spring.redis.lettuce.pool.max-idle=16

# Min idle connections
spring.redis.lettuce.pool.min-idle=4

# Max wait time for connection in milliseconds
spring.redis.lettuce.pool.max-wait=3000ms

# ===========================================
# CLUSTER REFRESH SETTINGS (Recommended)
# ===========================================

# Enable adaptive refresh for topology changes
spring.redis.lettuce.cluster.refresh.adaptive=true

# Enable periodic refresh
spring.redis.lettuce.cluster.refresh.periodic=true

# Refresh period in milliseconds (60 seconds)
spring.redis.lettuce.cluster.refresh.refresh-period=60000

# ===========================================
# IMPORTANT NOTES:
# ===========================================
# 1. Replace YOUR_NODE_X_HOST with actual hostnames or IPs
# 2. Ensure all cluster nodes are accessible from this application
# 3. All nodes should have the same password if authentication is enabled
# 4. Minimum 3 master nodes required for cluster to work
# 5. Comment out standalone config (spring.redis.host/port) when using cluster
