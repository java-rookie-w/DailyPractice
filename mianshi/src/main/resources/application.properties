# Spring Application Name
spring.application.name=mianshi

# Server Port
server.port=8080

# ===========================================
# Redis Standalone Configuration (Default)
# ===========================================
# Uncomment below for standalone mode and comment out cluster config

spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=
spring.redis.database=0
spring.redis.timeout=5000ms

# Redis Lettuce Connection Pool
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1ms

# ===========================================
# Redis Cluster Configuration
# ===========================================
# Uncomment below for cluster mode and comment out standalone config above

